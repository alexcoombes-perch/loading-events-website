intro_paragraphs:
  - "A love for weddings has been there for as long as can be remembered."
  - "The journey into the industry began at sixteen, photographing a first wedding after studying photography. What started as a focus on imagery quickly became something much more meaningful. I've always been drawn to people, their connections, and the quiet, in-between moments that often end up meaning the most."
  - "This naturally led into hospitality, with years spent learning how to create thoughtful guest experiences, stay calm under pressure, and bring order to the moving parts that sit behind seamless, memorable events."
  - "Today, that experience comes together through wedding coordination, creative direction, and on-the-day content creation—blending calm organisation with a considered creative eye to shape weddings that feel effortless, intentional, and full of atmosphere."
second_image: "/images/gallery/ceremony-02.jpg"
second_image_alt: "Guests watching the ceremony"
second_paragraphs:
  - "Outside of weddings, time is often spent in a pottery studio, growing wedding flowers, or by the coast. There's a love of soft light, pastel tones, and romantic detail that runs through everything, along with a slightly unhealthy obsession with sausage dogs."
  - "Travel, good food, and slow mornings are also part of what inspires everyday life."
  - "On a wedding day, it is always the in-between moments that stand out most—the glance before the ceremony, the shift in energy after the formalities, and the ease that settles once celebration takes over."
