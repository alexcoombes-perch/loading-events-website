about_teaser:
  heading: "Hi, I'm the person behind By Isla Studio."
  paragraph: "I started photographing weddings at sixteen, then spent years in hospitality learning how to keep a room calm when everything behind it is anything but. Now I bring both together: an eye for the details that matter, and the steady hands to make sure they actually happen."
  image: "/images/gallery/sneak-peek-01.jpg"
  image_alt: "Candid sneak peek moment from the day"
  cta_label: "More about me"
  cta_url: "/about/"
services_teaser:
  intro: "Whether you're looking for support throughout the planning process, someone to take the reins on the day itself or someone just to bring some ideas together with clarity. I'm here to make wedding planning feel exciting, not overwhelming."
  items:
    - name: "Wedding Coordination"
      description: "I step in behind the scenes to manage timelines, suppliers, and last-minute curveballs, so you can just enjoy the day."
    - name: "Creative Support & Planning"
      description: "Honest input and a second pair of hands throughout planning, so every detail feels considered, not thrown together."
    - name: "Content Creation"
      description: "Real, candid footage of the moments that matter, captured while they're actually happening."
  cta_label: "See all services"
  cta_url: "/services/"
photo_moment:
  image: "/images/gallery/sneak-peek-04.jpg"
  image_alt: "A spontaneous moment caught on the day"
  quote: "the moments you didn't plan, but will never forget"
process_steps:
  - number: "01"
    title: "We talk it through"
    description: "A free, no-pressure call to hear about your day, your suppliers, and what 'good' looks like to you. No script, just a proper conversation."
  - number: "02"
    title: "I take the reins"
    description: "Timelines built, suppliers briefed, details double-checked. Everything gets tighter and calmer the closer we get, not the other way round."
  - number: "03"
    title: "You actually enjoy your wedding"
    description: "On the day, I'm the one fielding questions, chasing the caterer, and fixing the small wobbles, so you're fully present for every moment of it."
closing_statement: |
  Every wedding I take on gets the same thing: full attention, straight answers, and someone who genuinely cares whether your day goes well, not just whether the timeline holds.

  If that sounds like what you're after, let's have a chat.
cta_label: "Let's Chat"
cta_url: "/contact/"
