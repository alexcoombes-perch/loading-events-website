hero_heading: "Weddings that feel like the best party you've ever thrown"
hero_intro: |
  You've done the hard part. You said yes, booked the venue, found the dress. Now you need someone who holds every thread of the day, so you don't have to.

  That's the job. Calm, capable, a bit cheeky when it helps, and completely on top of the details, so you're on the dance floor instead of checking your phone.
qualities:
  - "Calm behind the scenes."
  - "Thoughtful in the details."
  - "Genuinely fun to work with."
booking_note: "Now booking 2027 weddings, with a handful of 2026 dates still open."
process_steps:
  - number: "01"
    title: "We talk it through"
    description: "A free, no-pressure call to hear about your day, your suppliers, and what 'good' looks like to you. No script, just a proper conversation."
  - number: "02"
    title: "I take the reins"
    description: "Timelines built, suppliers briefed, details double-checked. Everything gets tighter and calmer the closer we get, not the other way round."
  - number: "03"
    title: "You actually enjoy your wedding"
    description: "On the day, I'm the one fielding questions, chasing the caterer, and fixing the small wobbles, so you're fully present for every moment of it."
