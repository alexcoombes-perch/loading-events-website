page_title: "Services | Loading Events."
heading: "Services"
accent_image: "/images/gallery/venue-highlights-05.jpg"
accent_image_alt: "Elegantly styled wedding reception room"
intro_paragraphs:
  - "Whether you need support throughout the planning process, someone to take the reins on the day itself, or just a second pair of hands to bring your ideas together, here's how I can help."
  - "Every package starts with a conversation, not a contract. We figure out together what you actually need, then I build around that."
services:
  - name: "Wedding Coordination"
    description: "You've planned your wedding, booked your dream suppliers, and thought through all the details. Now it's time to hand it over and enjoy it. I step in behind the scenes about six to eight weeks out to manage timelines, liaise with suppliers, oversee setup, troubleshoot last-minute curveballs, and make sure everything runs seamlessly from first look to last dance."
  - name: "Creative Support & Planning"
    description: "Need guidance, advice, or help bringing your ideas together? I'll work alongside you throughout planning to refine your vision, offer honest practical input, and make sure every detail feels considered and cohesive rather than thrown together."
  - name: "Content Creation"
    description: "The candid moments. The nerves before the ceremony. The hugs, happy tears, and dance floor chaos. My content creation service captures what happens behind the scenes, so you get beautifully real footage to relive and share long after the day is over."
photo_moment:
  image: "/images/gallery/details-06.jpg"
  image_alt: "Table centrepiece detail styled for the reception"
  quote: "the details you'll never have to think about"
faq:
  - question: "How far out should I book?"
    answer: "It depends what level of support you require, it can be anything from 6 weeks to 24 months."
  - question: "Do you only do full coordination?"
    answer: "No. Some couples want me for the full journey, others just want the final stretch handled so they're not the ones fielding supplier calls the week of. We'll build a package around what you actually need."
  - question: "What areas do you cover?"
    answer: "Based in the UK and happy to travel, including destination weddings. Travel and accommodation are simply added to your quote to ensure that everything is looked after for the duration of your event."
  - question: "What happens after I enquire?"
    answer: "You'll hear back within a couple of days to set up a free call. No pressure, no sales pitch, just a proper conversation about your day and whether we're a good fit."
closing_line: "Think of me as part planner, part creative, part calm presence, and your biggest cheerleader throughout the whole process."
cta_label: "Get In Touch"
cta_url: "/contact/"
