page_title: "Notes From My Couples | Loading Events."
heading: "Notes From My Couples"
intro_paragraphs:
  - "Loading Events is brand new, but wedding coordination isn't. These are notes from couples I worked with directly during my time coordinating weddings at Limekiln. I'll be adding to this list as new couples say yes to working together."
accent_image: "/images/gallery/sneak-peek-03.jpg"
accent_image_alt: "Candid moment shared between the couple"
testimonials:
  - quote: "We really did have the best day of our lives and that was in huge part to you all, from the incredible planning process, perfect interiors, and everything executed so beautifully. We were so stressed about the storm beforehand, but as soon as we stepped foot in the venue, we didn't worry about a single thing."
    names: "Wedding at Limekiln"
    date: ""
  - quote: "A huge special shout out to Isla, who has been utterly wonderful from start to finish. You made our day come together and we're so grateful for all the advice, the helpful steers and constant support. You are amazing!"
    names: "Wedding at Limekiln"
    date: ""
  - quote: "Nothing was too much trouble, they fully supported our ideas, and they genuinely cared about making our wedding exactly how we wanted it. The atmosphere, the vibe, the setting... everything was just stunning. We couldn't have wished for a better venue or a better team."
    names: "Wedding at Limekiln"
    date: "September 2024"
  - quote: "All the suppliers were amazing, and on the day we couldn't have been more grateful to Isla and the team. They thought of things we didn't, they organised things we hadn't thought of, and ultimately meant we were hands off and had the best day ever."
    names: "Wedding at Limekiln"
    date: "June 2025"
  - quote: "The professionalism from Isla and team was exemplary. We really appreciated their support in planning the day and their invaluable helping hands throughout the day itself to make it run so smoothly."
    names: "Wedding at Limekiln"
    date: "April 2026"
  - quote: "From the moment we arrived, you made us feel completely at ease, and knowing everything was in your hands allowed us to relax and enjoy every second of the day. Every single member of your team was amazing, kind, professional, and so attentive throughout."
    names: "Wedding at Limekiln"
    date: ""
no_reviews:
  heading: "Ask me for references"
  text: "I've been working weddings since I was sixteen, first behind a camera, then in hospitality, now coordinating the whole day start to finish. I'm happy to put you in touch with recent couples and suppliers who can tell you what it's actually like working with me. Just ask when we chat."
