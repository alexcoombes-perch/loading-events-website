page_title: "The Fun Stuff | Loading Events."
heading: "The Fun Stuff"
intro_paragraphs:
  - "The moments. The memories. The magic."
  - "This is where you'll find a collection of the weddings, celebrations, creative projects, and unforgettable moments I've had the privilege of being part of."
  - "I love weddings that feel personal. The thoughtful details, the packed dance floors, the emotional speeches, the spontaneous moments that nobody planned but everyone remembers."
  - "Every wedding tells a different story, and that's what makes this job so special."
  - "Take a look around, get inspired, and imagine what's possible for your own celebration."
closing_line: "After all, the best weddings aren't about perfection. They're about creating memories you'll be talking about for years to come."
