page_title: "The Fun Stuff | Loading Events."
heading: "The Fun Stuff"
intro_paragraphs:
  - "The moments. The memories. The magic."
  - "This is a real look at real weddings I've had the privilege of being part of. Not stock photos, not styled shoots, just the actual days."
  - "I love weddings that feel personal: the thoughtful details, the packed dance floors, the speeches that make everyone cry, the moments nobody planned but everyone remembers. Every wedding tells a different story, and that's what makes this job so good."
  - "Have a look around, and picture your own day in the mix."
closing_line: "The best weddings aren't about perfection. They're about the moments you'll be talking about for years to come."
