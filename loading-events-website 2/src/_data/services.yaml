page_title: "Services | Loading Events."
heading: "Services"
accent_image: "/images/gallery/gallery-07.jpg"
accent_image_alt: "First dance in a fairy-lit barn"
intro_paragraphs:
  - "Whether you're looking for support throughout the planning process, someone to take the reins on the day itself, or someone just to bring your ideas together with clarity — I'm here to make wedding planning feel exciting, not overwhelming."
services:
  - name: "Wedding Coordination"
    description: "You've planned your wedding, booked your dream suppliers, and thought through all the details. Now it's time to hand everything over and enjoy it. I'll step in behind the scenes to manage timelines, liaise with suppliers, oversee setup, troubleshoot any last-minute challenges, and ensure everything runs seamlessly from start to finish."
  - name: "Creative Support & Planning"
    description: "Need guidance, advice, creative input, or help bringing your ideas together? I'll work alongside you to refine your vision, offer practical planning support, and make sure every detail feels considered and cohesive."
  - name: "Content Creation"
    description: "The candid moments. The excitement before the ceremony. The hugs, happy tears, dance floor antics, and everything in between. My content creation service captures the moments that happen behind the scenes, giving you beautifully curated memories to relive and share long after the celebrations are over."
closing_line: "Think of me as part planner, part creative, part calm presence — and your biggest cheerleader throughout the process."
cta_label: "Get In Touch"
cta_url: "/contact/"
